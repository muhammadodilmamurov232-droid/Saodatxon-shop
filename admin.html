<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍💼 Admin Kabinet - Saodatxon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .header .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #999;
            font-size: 12px;
            margin-top: 5px;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-export {
            background: #28a745;
            color: white;
        }

        .btn-export:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .btn-refresh {
            background: #007bff;
            color: white;
        }

        .btn-refresh:hover {
            background: #0056b3;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-new {
            background: #ffc107;
            color: white;
        }

        .status-processing {
            background: #17a2b8;
            color: white;
        }

        .status-done {
            background: #28a745;
            color: white;
        }

        .action-btn {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .btn-edit {
            background: #007bff;
            color: white;
        }

        .btn-edit:hover {
            background: #0056b3;
        }

        .btn-delete-row {
            background: #dc3545;
            color: white;
        }

        .btn-delete-row:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-btn-save {
            background: #28a745;
            color: white;
        }

        .modal-btn-save:hover {
            background: #218838;
        }

        .modal-btn-cancel {
            background: #ddd;
            color: #333;
        }

        .modal-btn-cancel:hover {
            background: #bbb;
        }

        .phone-link {
            color: #007bff;
            text-decoration: none;
        }

        .phone-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
            }

            .header .stats {
                width: 100%;
                justify-content: space-around;
            }

            .buttons {
                width: 100%;
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- HEADER -->
    <div class="header">
        <div>
            <h1>👨‍💼 Admin Kabinet</h1>
            <p style="color: #999; margin-top: 5px;">Saodatxon Tikuvchilik Do'koni</p>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalOrders">0</div>
                <div class="stat-label">Jami Buyurtma</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="newOrders">0</div>
                <div class="stat-label">Yangi</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="doneOrders">0</div>
                <div class="stat-label">Tayyor</div>
            </div>
        </div>
        <div class="buttons">
            <button class="btn btn-refresh" onclick="refreshData()">🔄 Yangilash</button>
            <button class="btn btn-export" onclick="exportToCSV()">📥 Yuklab olish</button>
            <button class="btn btn-delete" onclick="deleteAllOrders()">🗑️ Hammasini O'chirish</button>
        </div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table id="buyurtmaTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Mahsulot</th>
                    <th>Ism</th>
                    <th>Telefon</th>
                    <th>Izoh</th>
                    <th>Vaqti</th>
                    <th>Status</th>
                    <th>Amallar</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display: none;">
            <h2>📭 Hali buyurtma yo'q</h2>
            <p>Buyurtmalar shu yerda ko'rinib turadi</p>
        </div>
    </div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>✏️ Buyurtmani Tahrirlashtirish</h2>
        <div class="form-group">
            <label>Mahsulot</label>
            <input type="text" id="editProduct" readonly>
        </div>
        <div class="form-group">
            <label>Ism</label>
            <input type="text" id="editName">
        </div>
        <div class="form-group">
            <label>Telefon</label>
            <input type="tel" id="editPhone">
        </div>
        <div class="form-group">
            <label>Izoh</label>
            <textarea id="editNote" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="editStatus">
                <option value="Yangi">🆕 Yangi</option>
                <option value="Jarayonda">⚙️ Jarayonda</option>
                <option value="Tayyor">✅ Tayyor</option>
            </select>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-save" onclick="saveEdit()">💾 Saqlash</button>
            <button class="modal-btn modal-btn-cancel" onclick="closeEditModal()">❌ Bekor Qilish</button>
        </div>
    </div>
</div>

<script>
let currentEditId = null;

function loadBuyurtmalar() {
    const buyurtmalar = JSON.parse(localStorage.getItem("buyurtmalar")) || [];
    const tableBody = document.getElementById("tableBody");
    const emptyState = document.getElementById("emptyState");

    tableBody.innerHTML = "";

    if (buyurtmalar.length === 0) {
        emptyState.style.display = "block";
        updateStats(buyurtmalar);
        return;
    }

    emptyState.style.display = "none";

    // Oxirgi buyurtmalar avval
    buyurtmalar.reverse().forEach((buyurtma) => {
        const tr = document.createElement("tr");
        
        let statusClass = "status-new";
        if (buyurtma.status === "Jarayonda") statusClass = "status-processing";
        if (buyurtma.status === "Tayyor") statusClass = "status-done";

        tr.innerHTML = `
            <td>${buyurtma.id}</td>
            <td><strong>${buyurtma.mahsulot}</strong></td>
            <td>${buyurtma.ism}</td>
            <td><a href="tel:${buyurtma.telefon}" class="phone-link">${buyurtma.telefon}</a></td>
            <td>${buyurtma.izoh || "-"}</td>
            <td><small>${buyurtma.vaqti}</small></td>
            <td><span class="status-badge ${statusClass}">${buyurtma.status}</span></td>
            <td>
                <button class="action-btn btn-edit" onclick="openEditModal(${buyurtma.id})">✏️ Tahrir</button>
                <button class="action-btn btn-delete-row" onclick="deleteBuyurtma(${buyurtma.id})">🗑️ O'ch</button>
            </td>
        `;
        tableBody.appendChild(tr);
    });

    updateStats(buyurtmalar);
}

function updateStats(buyurtmalar) {
    const total = buyurtmalar.length;
    const newCount = buyurtmalar.filter(b => b.status === "Yangi").length;
    const doneCount = buyurtmalar.filter(b => b.status === "Tayyor").length;

    document.getElementById("totalOrders").textContent = total;
    document.getElementById("newOrders").textContent = newCount;
    document.getElementById("doneOrders").textContent = doneCount;
}

function openEditModal(id) {
    const buyurtmalar = JSON.parse(localStorage.getItem("buyurtmalar")) || [];
    const buyurtma = buyurtmalar.find(b => b.id === id);

    if (buyurtma) {
        currentEditId = id;
        document.getElementById("editProduct").value = buyurtma.mahsulot;
        document.getElementById("editName").value = buyurtma.ism;
        document.getElementById("editPhone").value = buyurtma.telefon;
        document.getElementById("editNote").value = buyurtma.izoh;
        document.getElementById("editStatus").value = buyurtma.status;
        document.getElementById("editModal").style.display = "flex";
    }
}

function closeEditModal() {
    document.getElementById("editModal").style.display = "none";
}

function saveEdit() {
    const buyurtmalar = JSON.parse(localStorage.getItem("buyurtmalar")) || [];
    const index = buyurtmalar.findIndex(b => b.id === currentEditId);

    if (index !== -1) {
        buyurtmalar[index].ism = document.getElementById("editName").value;
        buyurtmalar[index].telefon = document.getElementById("editPhone").value;
        buyurtmalar[index].izoh = document.getElementById("editNote").value;
        buyurtmalar[index].status = document.getElementById("editStatus").value;

        localStorage.setItem("buyurtmalar", JSON.stringify(buyurtmalar));
        loadBuyurtmalar();
        closeEditModal();
        alert("✅ Saqlandi!");
    }
}

function deleteBuyurtma(id) {
    if (confirm("Aniq o'chirmoqchi musiz?")) {
        let buyurtmalar = JSON.parse(localStorage.getItem("buyurtmalar")) || [];
        buyurtmalar = buyurtmalar.filter(b => b.id !== id);
        localStorage.setItem("buyurtmalar", JSON.stringify(buyurtmalar));
        loadBuyurtmalar();
    }
}

function deleteAllOrders() {
    if (confirm("⚠️ BARCHA buyurtmalar o'chiriladi! Aniq?")) {
        localStorage.setItem("buyurtmalar", JSON.stringify([]));
        loadBuyurtmalar();
        alert("✅ Hammasini o'chirdim!");
    }
}

function refreshData() {
    loadBuyurtmalar();
    alert("🔄 Yangilandi!");
}

function exportToCSV() {
    const buyurtmalar = JSON.parse(localStorage.getItem("buyurtmalar")) || [];
    
    if (buyurtmalar.length === 0) {
        alert("📭 Yuklab oladigan ma'lumot yo'q!");
        return;
    }

    let csv = "ID,Mahsulot,Ism,Telefon,Izoh,Vaqti,Status\n";
    
    buyurtmalar.forEach(b => {
        csv += `${b.id},"${b.mahsulot}","${b.ism}","${b.telefon}","${b.izoh}","${b.vaqti}","${b.status}"\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "buyurtmalar.csv";
    a.click();
    window.URL.revokeObjectURL(url);
}

// Page load qilinganda
window.addEventListener("DOMContentLoaded", loadBuyurtmalar);

// Auto refresh har 5 soniya
setInterval(loadBuyurtmalar, 5000);

// Modal yopish
window.onclick = function(event) {
    const modal = document.getElementById("editModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
